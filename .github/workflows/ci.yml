name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Build-time only — no real DB connection is made (all pages are
      # dynamic/no generateStaticParams), and unit tests mock Prisma
      # entirely. Never use these values outside CI.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      AUTH_SECRET: "ci-build-only-not-a-real-secret"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "ci-build-only-not-a-real-password"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:run

      - run: npm run build
