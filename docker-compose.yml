services:
  postgres:
    image: postgres:16
    container_name: debt-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: debt_tracker
      POSTGRES_PASSWORD: debt_tracker_dev
      POSTGRES_DB: debt_tracker_next
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
